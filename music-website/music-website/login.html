<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musicify - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <!-- Left Section: Artistic Poster -->
        <div class="login-left">
            <div class="poster-content">
                <div class="blur-blob"></div>
                <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=2070&auto=format&fit=crop" alt="Musician" class="musician-image">
                <h1 class="emotional-text">Music is the shorthand of emotion.</h1>
                <p class="sub-text">Experience the rhythm of your soul.</p>
            </div>
        </div>

        <!-- Right Section: Login Panel -->
        <div class="login-right">
            <div class="login-card">
                <h2 class="heading-text">Let’s login to your music account.</h2>
                
            <form class="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="show-password">
                        <span class="checkmark"></span>
                        Show password
                    </label>
                </div>
                <button type="submit" class="sign-in-button">Sign In</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="#">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.querySelector('.login-form');
            const passwordInput = document.getElementById('password');
            const showPasswordCheckbox = document.getElementById('show-password');

            // Toggle password visibility
            showPasswordCheckbox.addEventListener('change', () => {
                passwordInput.type = showPasswordCheckbox.checked ? 'text' : 'password';
            });

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
